<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Security Detection System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background: linear-gradient(
                135deg,
                #0f172a,
                #1e293b,
                #111827
            );

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            color:white;

            padding:30px;
        }

        .container{

            width:90%;
            max-width:800px;

            background: rgba(255,255,255,0.08);

            padding:40px;

            border-radius:20px;

            backdrop-filter: blur(10px);

            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        h1{

            text-align:center;

            margin-bottom:30px;

            color:#38bdf8;

            font-size:38px;
        }

        .subtitle{

            text-align:center;

            margin-bottom:25px;

            color:#cbd5e1;

            font-size:16px;
        }

        textarea{

            width:100%;

            height:180px;

            padding:18px;

            border:none;

            border-radius:15px;

            resize:none;

            font-size:16px;

            background:#1e293b;

            color:white;

            outline:none;

            border:2px solid transparent;

            transition:0.3s;
        }

        textarea:focus{

            border:2px solid #38bdf8;
        }

        button{

            width:100%;

            margin-top:20px;

            padding:15px;

            border:none;

            border-radius:15px;

            background:#38bdf8;

            color:#0f172a;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#0ea5e9;

            transform:scale(1.02);
        }

        .result-box{

            margin-top:30px;

            padding:20px;

            border-radius:15px;

            background:#111827;

            border-left:6px solid #38bdf8;
        }

        .risk{

            font-size:22px;

            font-weight:bold;

            margin-bottom:15px;
        }

        .response{

            color:#e2e8f0;

            line-height:1.7;
        }

        .low{

            color:#22c55e;
        }

        .medium{

            color:#facc15;
        }

        .high{

            color:#ef4444;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Security Detection System</h1>

        <p class="subtitle">
            Semantic AI-Based Prompt Injection & Threat Detection
        </p>

        <form method="POST">

            <textarea
                name="prompt"
                placeholder="Enter your prompt here...">{{ request.form.get('prompt', '') }}</textarea>

            <button type="submit">
                Analyze Prompt
            </button>

        </form>

        {% if risk %}

        <div class="result-box">

            <div class="risk">

                Risk Level:

                <span class="
                    {% if risk == 'LOW' %}
                        low
                    {% elif risk == 'MEDIUM' %}
                        medium
                    {% else %}
                        high
                    {% endif %}
                ">

                    {{ risk }}

                </span>

            </div>

            <div class="response">

                <strong>System Response:</strong>

                <br><br>

                {{ response }}

            </div>

        </div>

        {% endif %}

    </div>

</body>

</html>
